---
# App 1 — Backstage core (Deployment, Service, Ingress, CNPG Cluster)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/DevOps_Backstage_Project.git
    targetRevision: main
    path: manifest/backstage        # ← only backstage-scoped files
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas

---
# App 2 — Ingress-NGINX LoadBalancer Service
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx-config
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/DevOps_Backstage_Project.git
    targetRevision: main
    path: manifest/ingress          # ← ingress-nginx-lb.yaml goes here
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx        # ← correct namespace for ingress controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true

---
# App 3 — MetalLB IP Pool Configuration
apiVersion: argoproj.io/v1alpha1
