---
# App 4 — Cert-Manager ClusterIssuer (cluster-scoped resource)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/DevOps_Backstage_Project.git
    targetRevision: main
    path: manifest/certmanager      # ← letsencrypt.yaml goes here
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager         # ← ClusterIssuer is cluster-scoped but
                                    #   cert-manager namespace is the convention
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true