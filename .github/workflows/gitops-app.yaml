name: Production GitOps Application Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'manifest/**'
  pull_request:
    branches:
      - main

env:
  APP_NAME: backstage
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
  GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
  GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
  YARNSW_COREPACK_COMPAT: 'true'

jobs:
# ==================================================
# STAGE 1: QUALITY GATE
# ==================================================
  test:
    name: Unit Tests & Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Enable Corepack
      run: |
        corepack enable
        corepack prepare yarn@4.4.1 --activate

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3

    - name: Install Dependencies
      run: yarn install --immutable --mode=skip-build

    - name: Run Linter
      run: yarn lint:all

    - name: Run Unit Tests
      run: yarn test

# ==================================================
# STAGE 2: BUILD & SECURITY
# ==================================================
  build:
    name: Build, Scan & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Enable Corepack
      run: |
        corepack enable
        corepack prepare yarn@4.4.1 --activate

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3 libsqlite3-dev pkg-config

    - name: Install Dependencies
      run: yarn install --immutable

  
    - name: Build Backend
      run: yarn build:backend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }} .

    - name: Container Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}
        format: table
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Push Image to Docker Hub
      run: |
        docker push ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}

# ==================================================
# STAGE 3: GITOPS UPDATE
# ==================================================
  deploy:
    name: Update GitOps Manifests
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ env.GIT_TOKEN }}

    - name: Configure Git Identity
      run: |
        git config --global user.name "$GIT_USERNAME"
        git config --global user.email "$GIT_EMAIL"

    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Create DB Secret in Cluster
      run: |
        kubectl create namespace backstage --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic backstage-db-credentials \
          --namespace backstage \
          --from-literal=username=backstage \
          --from-literal=password=${{ env.POSTGRES_PASSWORD }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Update Image Tag
      run: |
        sed -i "s|image: ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:.*|image: ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}|g" \
        manifest/backstage/backstage_deploy.yaml

    - name: Commit & Push GitOps Change
      run: |
        git add manifest/backstage/backstage_deploy.yaml
        git commit -m "chore(deploy): update ${{ env.APP_NAME }} to ${{ github.sha }} [skip ci]"
        git push origin main