---
# CloudNativePG Cluster
# The "backstage-db-credentials" Secret referenced below is NOT defined
# in this file. It is created by the Sealed Secrets controller decrypting
# "sealed-db-credentials.yaml" which lives alongside this file in Git.
#
# Deployment order (handled automatically by ArgoCD sync waves):
#   1. sealed-db-credentials.yaml  → Sealed Secrets controller decrypts → real Secret
#   2. cnpg-cluster.yaml           → CNPG reads the Secret → bootstraps DB
#
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage-db
  namespace: backstage
  annotations:
    # Sync wave 2 — ensures the SealedSecret (wave 1) is decrypted first
    argocd.argoproj.io/sync-wave: "2"
spec:
  instances: 1                    # EDIT: set to 3 for HA in production
  primaryUpdateStrategy: unsupervised

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

  bootstrap:
    initdb:
      database: backstage
      owner: backstage
      secret:
        name: backstage-db-credentials   # ← decrypted from sealed-db-credentials.yaml

  storage:
    size: 1Gi                     # EDIT: increase for production
    # storageClass: standard      # Uncomment and set your StorageClass if needed

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  monitoring:
    enablePodMonitor: false       # Set true if you have Prometheus installed